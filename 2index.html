<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>5×5 タイルエディタ + アニメーションプレビュー</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 20px;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 8px;
    }
    .row {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    canvas {
      border: 1px solid #333;
      background: #fff;
    }
    .panel-title {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .controls {
      margin: 12px 0;
    }
    button {
      margin-right: 8px;
      padding: 4px 10px;
      cursor: pointer;
    }
    .tile-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      max-width: 260px;
      margin-top: 8px;
    }
    .tile-item {
      border: 1px solid #ccc;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: #f8f8f8;
      font-size: 10px;
    }
    .tile-item.selected {
      border-color: #0078d4;
      box-shadow: 0 0 0 2px rgba(0,120,212,0.3);
    }
    .info {
      margin-top: 6px;
      font-size: 13px;
    }
    .small {
      font-size: 12px;
      color: #555;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>5×5 タイルエディタ + アニメーションプレビュー</h1>
  <div class="small">
    作品：0:歩く／1:走る／2:跳ぶ<br>
    操作：キャンバスをクリックしてタイル配置／Rキーで回転／PNG／PDF保存
  </div>

  <div class="controls">
    <button id="walkBtn">歩く</button>
    <button id="runBtn">走る</button>
    <button id="jumpBtn">跳ぶ</button>
  </div>

  <div class="row">
    <!-- 左：タイルエディタ -->
    <div>
      <div class="panel-title">タイルエディタ（5×5）</div>
      <canvas id="editCanvas" width="250" height="250"></canvas>
      <div class="info" id="tileInfo">選択中タイル: 2tile0.png　回転: 0°</div>
      <div class="panel-title" style="margin-top:8px;">タイル選択（2tile0～2tile20）</div>
      <div class="tile-list" id="tileList"></div>
      <div class="controls">
        <button id="savePngBtn">PNGとして保存</button>
        <button id="savePdfBtn">PDFとして保存</button>
      </div>
    </div>

    <!-- 右：アニメーションプレビュー -->
    <div>
      <div class="panel-title">アニメーションプレビュー</div>
      <canvas id="previewCanvas" width="250" height="250"></canvas>
      <div class="slider-row">
        <button id="playBtn">▶ プレビュー開始 / 停止</button>
        <label class="small">
          速度: <span id="fpsLabel">4</span> fps
        </label>
        <input type="range" id="fpsSlider" min="1" max="12" value="4">
      </div>
    </div>
  </div>

  <script>
    // ====== 基本設定 ======
    const GRID_SIZE = 5;
    const CANVAS_SIZE = 250;
    const CELL_SIZE = CANVAS_SIZE / GRID_SIZE;

    // 画像ファイル名（2tile0.png ～ 2tile20.png）
    const TILE_COUNT = 21;
    const tileImages = [];
    for (let i = 0; i < TILE_COUNT; i++) {
      const img = new Image();
      img.src = `2tile${i}.png`;   // ★ここが今回のポイント
      tileImages.push(img);
    }

    // ====== DOM 取得 ======
    const editCanvas = document.getElementById('editCanvas');
    const editCtx = editCanvas.getContext('2d');
    const previewCanvas = document.getElementById('previewCanvas');
    const previewCtx = previewCanvas.getContext('2d');

    const tileListEl = document.getElementById('tileList');
    const tileInfoEl = document.getElementById('tileInfo');
    const fpsSlider = document.getElementById('fpsSlider');
    const fpsLabel = document.getElementById('fpsLabel');

    const walkBtn = document.getElementById('walkBtn');
    const runBtn = document.getElementById('runBtn');
    const jumpBtn = document.getElementById('jumpBtn');
    const playBtn = document.getElementById('playBtn');
    const savePngBtn = document.getElementById('savePngBtn');
    const savePdfBtn = document.getElementById('savePdfBtn');

    // ====== 状態 ======
    let selectedTileIndex = 0;
    let rotation = 0; // 0, 90, 180, 270
    let grid = createEmptyGrid(); // 5×5 にタイル番号と回転を保持

    let isPlaying = false;
    let currentFrame = 0;
    let lastTime = 0;
    let fps = parseInt(fpsSlider.value, 10);

    // アニメーション用：3パターン（歩く／走る／跳ぶ）
    const animations = {
      walk: [],
      run: [],
      jump: []
    };
    let currentAnimation = 'walk';

    // ====== 初期化 ======
    initTileList();
    drawEditor();
    drawPreview();

    // ====== 関数群 ======
    function createEmptyGrid() {
      const g = [];
      for (let y = 0; y < GRID_SIZE; y++) {
        const row = [];
        for (let x = 0; x < GRID_SIZE; x++) {
          row.push({ tileIndex: null, rotation: 0 });
        }
        g.push(row);
      }
      return g;
    }

    function initTileList() {
      for (let i = 0; i < TILE_COUNT; i++) {
        const div = document.createElement('div');
        div.className = 'tile-item' + (i === 0 ? ' selected' : '');
        div.textContent = i; // シンプルに番号表示
        div.dataset.index = i;
        div.addEventListener('click', () => {
          selectedTileIndex = i;
          updateTileSelectionUI();
        });
        tileListEl.appendChild(div);
      }
      updateTileInfo();
    }

    function updateTileSelectionUI() {
      const items = tileListEl.querySelectorAll('.tile-item');
      items.forEach(el => {
        el.classList.toggle('selected', parseInt(el.dataset.index, 10) === selectedTileIndex);
      });
      updateTileInfo();
    }

    function updateTileInfo() {
      tileInfoEl.textContent = `選択中タイル: 2tile${selectedTileIndex}.png　回転: ${rotation}°`;
    }

    function drawEditor() {
      editCtx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
      // グリッド線
      editCtx.strokeStyle = '#ccc';
      for (let i = 0; i <= GRID_SIZE; i++) {
        const p = i * CELL_SIZE;
        editCtx.beginPath();
        editCtx.moveTo(p, 0);
        editCtx.lineTo(p, CANVAS_SIZE);
        editCtx.stroke();

        editCtx.beginPath();
        editCtx.moveTo(0, p);
        editCtx.lineTo(CANVAS_SIZE, p);
        editCtx.stroke();
      }

      // タイル描画
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          const cell = grid[y][x];
          if (cell.tileIndex !== null) {
            drawTile(editCtx, x, y, cell.tileIndex, cell.rotation);
          }
        }
      }
    }

    function drawTile(ctx, gx, gy, tileIndex, rot) {
      const img = tileImages[tileIndex];
      const cx = gx * CELL_SIZE;
      const cy = gy * CELL_SIZE;

      ctx.save();
      ctx.translate(cx + CELL_SIZE / 2, cy + CELL_SIZE / 2);
      ctx.rotate((rot * Math.PI) / 180);
      ctx.drawImage(img, -CELL_SIZE / 2, -CELL_SIZE / 2, CELL_SIZE, CELL_SIZE);
      ctx.restore();
    }

    function drawPreview() {
      previewCtx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      const frames = animations[currentAnimation];
      if (!frames.length) {
        // まだフレームがない場合はエディタの内容をそのまま表示
        for (let y = 0; y < GRID_SIZE; y++) {
          for (let x = 0; x < GRID_SIZE; x++) {
            const cell = grid[y][x];
            if (cell.tileIndex !== null) {
              drawTile(previewCtx, x, y, cell.tileIndex, cell.rotation);
            }
          }
        }
        return;
      }

      const frame = frames[currentFrame % frames.length];
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          const cell = frame[y][x];
          if (cell.tileIndex !== null) {
            drawTile(previewCtx, x, y, cell.tileIndex, cell.rotation);
          }
        }
      }
    }

    function copyCurrentGridToAnimation(animName) {
      // 現在の grid をディープコピーしてフレームとして追加
      const frame = grid.map(row =>
        row.map(cell => ({ tileIndex: cell.tileIndex, rotation: cell.rotation }))
      );
      animations[animName].push(frame);
    }

    // ====== イベント ======
    editCanvas.addEventListener('click', (e) => {
      const rect = editCanvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const gx = Math.floor(x / CELL_SIZE);
      const gy = Math.floor(y / CELL_SIZE);

      if (gx < 0 || gx >= GRID_SIZE || gy < 0 || gy >= GRID_SIZE) return;

      grid[gy][gx].tileIndex = selectedTileIndex;
      grid[gy][gx].rotation = rotation;
      drawEditor();
      drawPreview();
    });

    // Rキーで回転
    window.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') {
        rotation = (rotation + 90) % 360;
        updateTileInfo();
      }
    });

    // アニメーションパターン切り替え
    walkBtn.addEventListener('click', () => {
      currentAnimation = 'walk';
      copyCurrentGridToAnimation('walk');
      currentFrame = 0;
      drawPreview();
    });

    runBtn.addEventListener('click', () => {
      currentAnimation = 'run';
      copyCurrentGridToAnimation('run');
      currentFrame = 0;
      drawPreview();
    });

    jumpBtn.addEventListener('click', () => {
      currentAnimation = 'jump';
      copyCurrentGridToAnimation('jump');
      currentFrame = 0;
      drawPreview();
    });

    // 再生・停止
    playBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      playBtn.textContent = isPlaying ? '■ プレビュー停止' : '▶ プレビュー開始';
      if (isPlaying) {
        lastTime = performance.now();
        requestAnimationFrame(loop);
      }
    });

    function loop(timestamp) {
      if (!isPlaying) return;
      const delta = timestamp - lastTime;
      const interval = 1000 / fps;

      if (delta >= interval) {
        currentFrame++;
        drawPreview();
        lastTime = timestamp;
      }
      requestAnimationFrame(loop);
    }

    // FPS スライダー
    fpsSlider.addEventListener('input', () => {
      fps = parseInt(fpsSlider.value, 10);
      fpsLabel.textContent = fps;
    });

    // PNG 保存
    savePngBtn.addEventListener('click', () => {
      const a = document.createElement('a');
      a.href = editCanvas.toDataURL('image/png');
      a.download = 'tile-editor.png';
      a.click();
    });

    // PDF 保存（簡易：PNG をそのままダウンロードする形にしておく）
    savePdfBtn.addEventListener('click', () => {
      alert('簡易版のため、PNG保存のみ対応にしています。必要なら本格的なPDF対応も作れます。');
    });
  </script>
</body>
</html>
